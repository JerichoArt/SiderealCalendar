<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sidereal Calendar</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="manifest" href="manifest.json"> 
  <!-- Tailwind CSS & SunCalc from original sources -->
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.4.1/dist/tailwind.min.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.9.0/suncalc.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="icon" href="data:,">
  <!-- Our newly separated custom CSS file -->
  <link rel="stylesheet" href="style.css">
</head>
<body class="p-4 md:p-6">
  <div class="max-w-7xl mx-auto">
      <h1 class="text-3xl font-bold mb-4 text-center text-gray-800">Sidereal Decimal Calendar</h1>

      <div class="controls flex flex-wrap items-center gap-4 mb-4">
        <label class="flex items-center gap-2">Year: <select id="year-select" class="border border-gray-300 rounded px-2 py-1"></select></label>
        <label class="flex items-center gap-2">Season: <select id="season-select" class="border border-gray-300 rounded px-2 py-1"></select></label>
        <label class="flex items-center gap-1">
          Month: 
          <div class="inline-flex items-center bg-gray-100 rounded border border-gray-300 overflow-hidden">
            <!-- Left Arrow Button -->
            <button id="prev-month-btn" type="button" class="px-2 py-1 bg-white hover:bg-gray-200 border-r border-gray-300 font-bold">&larr;</button>
            
            <!-- Month Select Dropdown -->
            <select id="month-select" class="bg-white px-2 py-1 outline-none"></select>
            
            <!-- Right Arrow Button -->
            <button id="next-month-btn" type="button" class="px-2 py-1 bg-white hover:bg-gray-200 border-l border-gray-300 font-bold">&rarr;</button>
          </div>
        </label>
        
        <div class="flex flex-wrap gap-2 w-full lg:w-auto lg:ml-auto justify-center sm:justify-start">
          <div class="flex flex-col md:flex-row items-center gap-2 bg-gray-100 p-3 rounded-md shadow-inner">
            <label for="datetime-input" class="text-gray-700 font-medium whitespace-nowrap">Go to:</label>
            <input type="text" id="datetime-input" placeholder="DD/MM/YYYY HH:MM" class="border border-gray-300 rounded px-2 py-1 text-gray-800 focus:ring-blue-500 focus:border-blue-500">
            <button id="go-to-btn" class="bg-green-500 hover:bg-green-600 text-white font-semibold px-3 py-1 rounded-md shadow-sm whitespace-nowrap">Go</button>
            <div id="nare-display-output" class="text-gray-800 font-medium bg-gray-200 px-3 py-1 rounded-md min-w-[150px] text-center">
              Click an Hour box
            </div>
          </div>
          <button id="print-btn" class="bg-blue-500 hover:bg-blue-600 text-white font-semibold px-4 py-2 rounded-md shadow-sm">Print</button>
          <button id="today-btn" class="bg-cyan-500 hover:bg-cyan-600 text-white font-semibold px-4 py-2 rounded-md shadow-sm">Today</button>
		  
        <!-- Room Sync Controls -->
        <div id="room-controls" style="display: inline-flex; align-items: center; gap: 8px; margin-left: 10px; padding-left: 10px; border-left: 2px solid #e2e8f0;">
          <input type="text" id="room-input" placeholder="Room Name..." style="padding: 6px 12px; border: 1px solid #cbd5e0; border-radius: 4px; font-size: 0.9rem; outline: none; width: 120px;" />
          <input type="password" id="room-password-input" placeholder="Password..." style="padding: 6px 12px; border: 1px solid #cbd5e0; border-radius: 4px; font-size: 0.9rem; outline: none; width: 120px;" />
          <button id="join-room-btn" style="background-color: #3b82f6; color: white; border: none; padding: 6px 12px; border-radius: 4px; font-weight: 500; cursor: pointer; font-size: 0.9rem;">Join Room</button>
          <span id="room-status" style="font-size: 0.85rem; color: #718096; font-weight: 500;">Offline Mode</span>
        </div>
      </div>

      <div class="overflow-x-auto shadow-lg rounded-lg">
        <table id="calendar-table">
          <thead>
            <tr id="header-row-main">
              <th rowspan="2">Day</th>
              <th rowspan="2">Whole Day</th>
              <th colspan="10">Hours</th>
            </tr>
             <tr id="header-row-sub">
                <th>1</th><th>2</th><th>3</th><th>4</th><th>5</th>
                <th>6</th><th>7</th><th>8</th><th>9</th><th>10</th>
            </tr>
          </thead>
          <tbody id="calendar-body"></tbody>
        </table>
      </div>

      <div id="data-controls" class="flex flex-col md:flex-row gap-4 mt-8 justify-center items-center">
          <button id="export-btn" class="bg-gray-700 hover:bg-gray-800 text-white font-semibold px-6 py-2 rounded-md shadow-lg">Export Data</button>
          <button id="import-btn" class="bg-green-600 hover:bg-green-700 text-white font-semibold px-6 py-2 rounded-md shadow-lg">Import Data</button>
          <input type="file" id="file-input" accept="application/json" class="hidden">
      </div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Our newly separated JavaScript file -->
  <script src="app.js" defer></script>
</body>
</html>
